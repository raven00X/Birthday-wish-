<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise...</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #timer-container {
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        #countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #e74c3c;
        }

        #surprise {
            display: none; /* Hidden by default */
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #surprise img {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 3rem;
            color: #2ecc71;
            margin-top: 20px;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="timer-container">
        <h1>Something is happening in...</h1>
        <div id="countdown">05:00</div>
    </div>

    <div id="surprise">
        <!-- REPLACE THE URL BELOW WITH THE PHOTO YOU WANT TO SHOW -->
        <img src="https://via.placeholder.com/600x400?text=Happy+Birthday!" alt="Surprise!">
        <h2>HAPPY BIRTHDAY! 🎉</h2>
    </div>

    <script>
        // Set the countdown time (5 minutes)
        let timeRemaining = 5 * 60; 

        const countdownElement = document.getElementById('countdown');
        const timerContainer = document.getElementById('timer-container');
        const surpriseContainer = document.getElementById('surprise');

        const timerInterval = setInterval(() => {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;

            // Format numbers to always show two digits
            countdownElement.innerHTML = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                showSurprise();
            }

            timeRemaining--;
        }, 1000);

        function showSurprise() {
            timerContainer.style.display = 'none';
            surpriseContainer.style.display = 'block';
            
            // Optional: Play a sound if you want (requires user interaction first)
            // let audio = new Audio('celebration.mp3');
            // audio.play();
        }
    </script>
</body>
</html>
